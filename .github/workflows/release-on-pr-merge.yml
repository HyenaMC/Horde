name: Release on PR Merge

on:
  pull_request:
    types: [closed]
    # 修改为你的目标分支，例如 master/release
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  build-and-release:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B -ntp -DskipTests clean package

      - name: Read project metadata from pom.xml
        id: meta
        shell: bash
        run: |
          VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version | tr -d '\r')
          ARTIFACT_ID=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.artifactId | tr -d '\r')
          NAME=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.name | tr -d '\r')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "未能从 pom.xml 读取到 project.version" >&2
            exit 1
          fi
          if [ -z "$ARTIFACT_ID" ] || [ "$ARTIFACT_ID" = "null" ]; then
            echo "未能从 pom.xml 读取到 project.artifactId" >&2
            exit 1
          fi
          JAR_PATH="target/${ARTIFACT_ID}-${VERSION}.jar"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact_id=$ARTIFACT_ID" >> "$GITHUB_OUTPUT"
          echo "plugin_name=${NAME:-$ARTIFACT_ID}" >> "$GITHUB_OUTPUT"
          echo "jar_path=$JAR_PATH" >> "$GITHUB_OUTPUT"
          ls -la target || true
          if [ ! -f "$JAR_PATH" ]; then
            echo "未找到打包产物 $JAR_PATH，改为发布 target 目录下所有 jar" >&2
          fi

      - name: Compute tag (avoid duplicates)
        id: tag
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const version = process.env.VERSION;
            const baseTag = `v${version}`;
            let tag = baseTag;
            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${baseTag}` });
              tag = `${baseTag}-${context.payload.pull_request?.number ?? 'manual'}`;
              core.info(`Tag ${baseTag} exists, using fallback ${tag}`);
            } catch (e) {
              core.info(`Tag ${baseTag} is available`);
            }
            core.setOutput('tag', tag);

      - name: Generate release notes (PR commits)
        id: notes
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setOutput('body', '该次发布为手动触发，详情请查询我们的网站https://minecraft.teamhyena.org');
            } else {
              const commits = await github.paginate(github.rest.pulls.listCommits, {
                owner, repo, pull_number: pr.number, per_page: 100
              });
              const lines = commits.map(c => `- ${c.sha.substring(0,7)} ${c.commit.message.split('\n')[0]} (${c.author?.login ?? c.commit.author?.name ?? 'unknown'})`);
              const header = `PR: ${pr.html_url} ${pr.title} 请访问详情界面查看具体情况 \n\nCommits:\n`;
              core.setOutput('body', header + lines.join('\n'));
            }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Horde v${{ steps.meta.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
          prerelease: ${{ contains(steps.meta.outputs.version, 'alpha') || contains(steps.meta.outputs.version, 'beta') || contains(steps.meta.outputs.version, 'rc') }}
          files: |
            ${{ steps.meta.outputs.jar_path }}
          overwrite: true